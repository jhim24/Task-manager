<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#e9edf2;
}

/* HEADER */
.header {
    background: linear-gradient(#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.container { padding:20px; }

/* CARDS */
.cards { display:flex; gap:15px; }
.card {
    flex:1;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card-header { padding:10px; color:white; font-weight:bold; }
.blue{background:#2c5fa8;}
.green{background:#2fa84f;}
.red{background:#d83b3b;}
.card-body {
    text-align:center;
    font-size:28px;
    padding:20px;
}

/* GRID */
.grid { display:flex; gap:20px; margin-top:20px; }

.box {
    flex:1;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FORM 2-COLUMN */
.form-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
}

.form-grid input,
.form-grid select {
    width:100%;
    padding:8px;
    font-size:13px;
}

.form-grid button {
    grid-column: span 2;
    padding:10px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* CONTROLS */
.controls {
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}
.controls input, .controls select {
    padding:6px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:15px;
}

th, td {
    border:1px solid #ccc;
    padding:10px;
}

th {
    background:#7fa6d9;
    color:white;
}

tr:hover {
    background:#eef5ff;
}

/* BADGES */
.badge {
    padding:5px 10px;
    border-radius:5px;
    color:white;
}
.high{background:red;}
.low{background:orange;}
.progress-status{background:#f39c12;}
.not{background:gray;}
.done{background:green;}

/* BUTTONS */
.action-btn {
    padding:5px 8px;
    margin:2px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

/* MOBILE */
@media(max-width:768px){
.cards,.grid{flex-direction:column;}
.form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card">
<div class="card-header blue">Total</div>
<div class="card-body" id="total">0</div>
</div>

<div class="card">
<div class="card-header green">Completed</div>
<div class="card-body" id="completed">0</div>
</div>

<div class="card">
<div class="card-header red">Pending</div>
<div class="card-body" id="pending">0</div>
</div>
</div>

<!-- ADD TASK -->
<div class="grid">
<div class="box">

<h3>Add Task</h3>

<div class="form-grid">
<input type="text" id="task" placeholder="Task name">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<!-- FIXED ORDER -->
<select id="status">
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Add Task</button>
</div>

</div>
</div>

<!-- CONTROLS -->
<div class="controls">
<input type="text" id="search" placeholder="Search..." onkeyup="render()">

<select id="filterCategory" onchange="render()">
<option value="">All Category</option>
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<!-- FIXED ORDER -->
<select id="filterStatus" onchange="render()">
<option value="">All Status</option>
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<select id="sortBy" onchange="render()">
<option value="">Sort</option>
<option value="due">Due Date</option>
<option value="priority">Priority</option>
</select>
</div>

<!-- TABLE -->
<table id="table"></table>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = -1;

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render(){
    const table = document.getElementById("table");
    let data = [...tasks];

    const search = document.getElementById("search").value.toLowerCase();
    if(search){
        data = data.filter(t=>t.task.toLowerCase().includes(search));
    }

    const cat = document.getElementById("filterCategory").value;
    const stat = document.getElementById("filterStatus").value;

    if(cat) data = data.filter(t=>t.cat==cat);
    if(stat) data = data.filter(t=>t.status==stat);

    const sort = document.getElementById("sortBy").value;
    if(sort=="due"){
        data.sort((a,b)=>new Date(a.due)-new Date(b.due));
    }
    if(sort=="priority"){
        data.sort((a,b)=>a.priority=="High"?-1:1);
    }

    table.innerHTML = `
    <tr>
    <th>Task</th><th>Category</th><th>Priority</th><th>Status</th><th>Due</th><th>Action</th>
    </tr>`;

    data.forEach((t,i)=>{
        table.innerHTML += `
        <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td><span class="badge ${t.priority=='High'?'high':'low'}">${t.priority}</span></td>
        <td><span class="badge ${
            t.status=='Completed'?'done':
            t.status=='In Progress'?'progress-status':'not'
        }">${t.status}</span></td>
        <td>${t.due || '-'}</td>
        <td>
            <button class="action-btn edit" onclick="editTask(${i})">Edit</button>
            <button class="action-btn delete" onclick="del(${i})">Delete</button>
        </td>
        </tr>`;
    });

    document.getElementById("total").innerText = tasks.length;
    document.getElementById("completed").innerText = tasks.filter(t=>t.status=="Completed").length;
    document.getElementById("pending").innerText = tasks.filter(t=>t.status!="Completed").length;
}

function addTask(){
    const taskInput = document.getElementById("task");
    const categoryInput = document.getElementById("category");
    const priorityInput = document.getElementById("priority");
    const statusInput = document.getElementById("status");
    const dueInput = document.getElementById("due");

    if(!taskInput.value) return alert("Enter task");

    if(editIndex==-1){
        tasks.push({
            task: taskInput.value,
            cat: categoryInput.value,
            priority: priorityInput.value,
            status: statusInput.value,
            due: dueInput.value
        });
    } else {
        tasks[editIndex] = {
            task: taskInput.value,
            cat: categoryInput.value,
            priority: priorityInput.value,
            status: statusInput.value,
            due: dueInput.value
        };
        editIndex = -1;
    }

    taskInput.value="";
    save();
    render();
}

function editTask(i){
    const t = tasks[i];
    document.getElementById("task").value = t.task;
    document.getElementById("category").value = t.cat;
    document.getElementById("priority").value = t.priority;
    document.getElementById("status").value = t.status;
    document.getElementById("due").value = t.due;

    editIndex = i;
}

function del(i){
    tasks.splice(i,1);
    save();
    render();
}

render();
</script>

</body>
</html>
