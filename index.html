<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>

<style>
body {
    font-family: Arial;
    margin:0;
    background:#e9edf2;
}

/* HEADER */
.header {
    background: linear-gradient(#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:20px;
}

/* CONTAINER */
.container { padding:20px; }

/* CARDS */
.cards {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.card {
    flex:1;
    min-width:140px;
    background:white;
    border-radius:8px;
    overflow:hidden;
    text-align:center;
}
.card-header {
    padding:8px;
    color:white;
    font-weight:bold;
}
.card-body {
    font-size:22px;
    padding:15px;
}

/* COLORS */
.blue{background:#2c5fa8;}
.green{background:#2fa84f;}
.red{background:#d83b3b;}
.orange{background:#f39c12;}
.gray{background:#7f8c8d;}

/* GRID */
.grid {
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.box {
    width:400px;
    background:white;
    padding:15px;
    border-radius:8px;
}

/* FORM FIXED */
.form-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    justify-items:center;
}

.form-grid input,
.form-grid select {
    width:85%;
    padding:6px;
    font-size:13px;
}

/* BUTTON SMALL */
.form-grid button {
    grid-column: span 2;
    width:45%;
    padding:7px;
    font-size:13px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* CONTROLS */
.controls {
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}
.controls input, .controls select {
    padding:6px;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:15px;
}

th, td {
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th {
    background:#7fa6d9;
    color:white;
}

/* BADGES */
.badge {
    padding:5px 10px;
    border-radius:5px;
    color:white;
}
.high{background:red;}
.low{background:orange;}
.progress-status{background:#f39c12;}
.not{background:gray;}
.done{background:green;}

/* BUTTONS */
.action-btn {
    padding:5px 8px;
    margin:2px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

@media(max-width:768px){
.form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
<p>KURTNEY LOVE SACDALAN</p>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card"><div class="card-header blue">TOTAL</div><div class="card-body" id="total">0</div></div>
<div class="card"><div class="card-header green">COMPLETED</div><div class="card-body" id="completed">0</div></div>
<div class="card"><div class="card-header red">PENDING</div><div class="card-body" id="pending">0</div></div>
<div class="card"><div class="card-header orange">IN PROGRESS</div><div class="card-body" id="inprogress">0</div></div>
<div class="card"><div class="card-header gray">NOT STARTED</div><div class="card-body" id="notstarted">0</div></div>
</div>

<!-- FORM -->
<div class="grid">
<div class="box">

<h3 style="text-align:center;">Add Task</h3>

<div class="form-grid">
<input type="text" id="task" placeholder="Task name">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<select id="status">
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Add Task</button>
</div>

</div>
</div>

<!-- CONTROLS -->
<div class="controls">
<input type="text" id="search" placeholder="Search..." onkeyup="render()">

<select id="filterCategory" onchange="render()">
<option value="">All Category</option>
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="filterStatus" onchange="render()">
<option value="">All Status</option>
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<select id="sortBy" onchange="render()">
<option value="">Sort</option>
<option value="due">Due Date</option>
<option value="priority">Priority</option>
</select>
</div>

<!-- TABLE -->
<table id="table"></table>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = -1;

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render(){
    const table = document.getElementById("table");
    let data = [...tasks];

    const search = document.getElementById("search").value.toLowerCase();
    if(search){
        data = data.filter(t=>t.task.toLowerCase().includes(search));
    }

    const cat = document.getElementById("filterCategory").value;
    const stat = document.getElementById("filterStatus").value;

    if(cat) data = data.filter(t=>t.cat==cat);
    if(stat) data = data.filter(t=>t.status==stat);

    const sort = document.getElementById("sortBy").value;
    if(sort=="due"){
        data.sort((a,b)=>new Date(a.due)-new Date(b.due));
    }
    if(sort=="priority"){
        data.sort((a,b)=>a.priority=="High"?-1:1);
    }

    table.innerHTML = `
    <tr>
    <th>Task</th><th>Category</th><th>Priority</th><th>Status</th><th>Due</th><th>Action</th>
    </tr>`;

    data.forEach((t,i)=>{
        table.innerHTML += `
        <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td><span class="badge ${t.priority=='High'?'high':'low'}">${t.priority}</span></td>
        <td><span class="badge ${
            t.status=='Completed'?'done':
            t.status=='In Progress'?'progress-status':'not'
        }">${t.status}</span></td>
        <td>${t.due || '-'}</td>
        <td>
            <button class="action-btn edit" onclick="editTask(${i})">Edit</button>
            <button class="action-btn delete" onclick="del(${i})">Delete</button>
        </td>
        </tr>`;
    });

    let total = tasks.length;
    let completed = tasks.filter(t=>t.status=="Completed").length;
    let inprogress = tasks.filter(t=>t.status=="In Progress").length;
    let notstarted = tasks.filter(t=>t.status=="Not Started").length;
    let pending = total - completed;

    document.getElementById("total").innerText = total;
    document.getElementById("completed").innerText = completed;
    document.getElementById("pending").innerText = pending;
    document.getElementById("inprogress").innerText = inprogress;
    document.getElementById("notstarted").innerText = notstarted;
}

function addTask(){
    const taskInput = document.getElementById("task");
    const categoryInput = document.getElementById("category");
    const priorityInput = document.getElementById("priority");
    const statusInput = document.getElementById("status");
    const dueInput = document.getElementById("due");

    if(!taskInput.value) return alert("Enter task");

    const newTask = {
        task: taskInput.value,
        cat: categoryInput.value,
        priority: priorityInput.value,
        status: statusInput.value,
        due: dueInput.value
    };

    if(editIndex==-1){
        tasks.push(newTask);
    } else {
        tasks[editIndex] = newTask;
        editIndex = -1;
    }

    taskInput.value="";
    save();
    render();
}

function editTask(i){
    const t = tasks[i];
    document.getElementById("task").value = t.task;
    document.getElementById("category").value = t.cat;
    document.getElementById("priority").value = t.priority;
    document.getElementById("status").value = t.status;
    document.getElementById("due").value = t.due;
    editIndex = i;
}

function del(i){
    tasks.splice(i,1);
    save();
    render();
}

render();
</script>

</body>
</html>
