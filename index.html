<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
body {
    font-family:'Segoe UI', Arial;
    margin:0;
    background: linear-gradient(135deg,#dfe9f3,#f5f7fa);
}

/* HEADER */
.header {
    background: linear-gradient(135deg,#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:12px 10px;
}
.header h1{margin:0;font-size:20px;}
.header p{margin:2px 0 0;font-size:12px;}

/* CONTAINER */
.container { padding:20px; max-width:1100px; margin:auto; }

/* CARDS */
.cards {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}
.card {
    flex:1;
    min-width:160px;
    background:linear-gradient(135deg,#ffffff,#f1f4f9);
    border-radius:12px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card-header {
    padding:10px;
    color:white;
    font-weight:bold;
}
.card-body {
    font-size:24px;
    padding:18px;
}

/* COLORS */
.blue{background:#2c5fa8;}
.green{background:#2fa84f;}
.red{background:#d83b3b;}
.orange{background:#f39c12;}
.gray{background:#7f8c8d;}

/* ADD BUTTON */
.open-btn {
    margin-top:20px;
    padding:10px 15px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CONTROLS */
.controls {
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}
.controls input, .controls select {
    padding:8px;
    border-radius:6px;
    border:1px solid #ccc;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:linear-gradient(135deg,#ffffff,#f4f7fb);
    border-radius:10px;
    overflow:hidden;
}
th, td {
    border:1px solid #d6dee6;
    padding:12px;
    text-align:center;
}
th {
    background:#2c5fa8;
    color:white;
}
tr:nth-child(even){
    background:#f1f5fa;
}

/* BADGES */
.badge {
    padding:6px 10px;
    border-radius:6px;
    color:white;
    font-size:12px;
}
.high{background:#e74c3c;}
.low{background:#f39c12;}
.progress-status{background:#3498db;}
.not{background:#7f8c8d;}
.done{background:#2ecc71;}

/* BUTTONS */
.action-btn {
    padding:6px 10px;
    margin:2px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-content {
    background:linear-gradient(135deg,#ffffff,#eef3f9);
    margin:10% auto;
    padding:20px;
    width:90%;
    max-width:450px;
    border-radius:12px;
}
.close {
    float:right;
    font-size:20px;
    cursor:pointer;
}

/* FORM */
.form-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}
.form-grid input,
.form-grid select {
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}
.form-grid button {
    grid-column:span 2;
    padding:10px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:6px;
}

/* MOBILE */
@media(max-width:768px){
.form-grid{grid-template-columns:1fr;}
.cards{flex-direction:column;}
}
    /* GLOW VARIABLES */
:root {
    --glow: 0 0 8px rgba(44,95,168,0.6),
            0 0 15px rgba(44,95,168,0.4);
}

/* ADD TASK BUTTON GLOW */
.open-btn {
    box-shadow: var(--glow);
    transition:0.3s;
}
.open-btn:hover {
    box-shadow: 0 0 12px #2c5fa8, 0 0 25px #2c5fa8;
}

/* FORM BUTTON GLOW */
.form-grid button {
    box-shadow: var(--glow);
}
.form-grid button:hover {
    box-shadow: 0 0 12px #2c5fa8, 0 0 25px #2c5fa8;
}

/* CARD GLOW ON HOVER */
.card:hover {
    box-shadow: 0 0 10px rgba(44,95,168,0.4),
                0 0 20px rgba(44,95,168,0.3);
}

/* MODAL GLOW */
.modal-content {
    box-shadow: 0 0 15px rgba(44,95,168,0.3),
                0 0 40px rgba(44,95,168,0.2);
}

/* INPUT FOCUS GLOW */
.form-grid input:focus,
.form-grid select:focus {
    box-shadow: 0 0 8px rgba(44,95,168,0.5);
    border-color:#2c5fa8;
}

/* TABLE HOVER GLOW */
tr:hover {
    background:#eaf2ff;
    box-shadow: inset 0 0 10px rgba(44,95,168,0.1);
}
</style>

</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
<p>KURTNEY LOVE SACDALAN</p>
</div>

<div class="container">

<!-- CARDS -->

<div class="cards">
<div class="card"><div class="card-header blue">TOTAL</div><div class="card-body" id="total">0</div></div>
<div class="card"><div class="card-header green">COMPLETED</div><div class="card-body" id="completed">0</div></div>
<div class="card"><div class="card-header red">PENDING</div><div class="card-body" id="pending">0</div></div>
<div class="card"><div class="card-header orange">IN PROGRESS</div><div class="card-body" id="inprogress">0</div></div>
<div class="card"><div class="card-header gray">NOT STARTED</div><div class="card-body" id="notstarted">0</div></div>
</div>

<!-- ADD BUTTON -->

<button class="open-btn" onclick="openModal()">+ Add Task</button>

<!-- CONTROLS -->

<div class="controls">
<input type="text" id="search" placeholder="Search..." onkeyup="render()">

<select id="filterCategory" onchange="render()">
<option value="">All Category</option>
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="filterStatus" onchange="render()">
<option value="">All Status</option>
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<select id="sortBy" onchange="render()">
<option value="">Sort</option>
<option value="due">Due Date</option>
<option value="priority">Priority</option>
</select>
</div>

<!-- TABLE -->

<table id="table"></table>

</div>

<!-- MODAL -->

<div id="taskModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">×</span>

<h3>Add Task</h3>

<div class="form-grid">
<input type="text" id="task" placeholder="Task name">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<select id="status">
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Save Task</button>

</div>

</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = -1;

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function openModal(){
    document.getElementById("taskModal").style.display="block";
}

function closeModal(){
    document.getElementById("taskModal").style.display="none";
}

function render(){
    const table=document.getElementById("table");
    let data=[...tasks];

    const search=document.getElementById("search").value.toLowerCase();
    if(search){
        data=data.filter(t=>t.task.toLowerCase().includes(search));
    }

    const cat=document.getElementById("filterCategory").value;
    const stat=document.getElementById("filterStatus").value;

    if(cat) data=data.filter(t=>t.cat==cat);
    if(stat) data=data.filter(t=>t.status==stat);

    const sort=document.getElementById("sortBy").value;
    if(sort=="due") data.sort((a,b)=>new Date(a.due)-new Date(b.due));
    if(sort=="priority") data.sort((a,b)=>a.priority=="High"?-1:1);

    table.innerHTML=`
    <tr>
    <th>Task</th><th>Category</th><th>Priority</th><th>Status</th><th>Due</th><th>Action</th>
    </tr>`;

    data.forEach((t,i)=>{
        table.innerHTML+=`
        <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td><span class="badge ${t.priority=='High'?'high':'low'}">${t.priority}</span></td>
        <td><span class="badge ${
            t.status=='Completed'?'done':
            t.status=='In Progress'?'progress-status':'not'
        }">${t.status}</span></td>
        <td>${t.due||'-'}</td>
        <td>
            <button class="action-btn edit" onclick="editTask(${i})">Edit</button>
            <button class="action-btn delete" onclick="del(${i})">Delete</button>
        </td>
        </tr>`;
    });

    let total=tasks.length;
    let completed=tasks.filter(t=>t.status=="Completed").length;
    let inprogress=tasks.filter(t=>t.status=="In Progress").length;
    let notstarted=tasks.filter(t=>t.status=="Not Started").length;
    let pending=total-completed;

    document.getElementById("total").innerText=total;
    document.getElementById("completed").innerText=completed;
    document.getElementById("pending").innerText=pending;
    document.getElementById("inprogress").innerText=inprogress;
    document.getElementById("notstarted").innerText=notstarted;
}

function addTask(){
    const task=document.getElementById("task").value;
    if(!task) return alert("Enter task");

    const newTask={
        task:task,
        cat:document.getElementById("category").value,
        priority:document.getElementById("priority").value,
        status:document.getElementById("status").value,
        due:document.getElementById("due").value
    };

    if(editIndex==-1){
        tasks.push(newTask);
    } else {
        tasks[editIndex]=newTask;
        editIndex=-1;
    }

    document.getElementById("task").value="";
    save();
    render();
    closeModal();
}

function editTask(i){
    const t=tasks[i];
    document.getElementById("task").value=t.task;
    document.getElementById("category").value=t.cat;
    document.getElementById("priority").value=t.priority;
    document.getElementById("status").value=t.status;
    document.getElementById("due").value=t.due;
    editIndex=i;
    openModal();
}

function del(i){
    tasks.splice(i,1);
    save();
    render();
}

render();
</script>

</body>
</html>
