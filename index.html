<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Task Dashboard</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  display: flex;
  background: #f5f7fb;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  height: 100vh;
  background: #0c1b2a;
  color: white;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar ul {
  list-style: none;
}

.sidebar li {
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.sidebar li.active,
.sidebar li:hover {
  background: #1d3b5c;
}

.add-task {
  margin-top: 40px;
  background: #1d5cff;
  padding: 15px;
  border-radius: 15px;
  text-align: center;
  cursor: pointer;
}

/* MAIN */
.main {
  flex: 1;
  padding: 25px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.search {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 200px;
}

/* WELCOME CARD */
.welcome {
  display: flex;
  justify-content: space-between;
  background: white;
  padding: 25px;
  border-radius: 20px;
  margin-bottom: 20px;
}

.welcome button {
  background: #1d5cff;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

/* BLUE CARD */
.blue-card {
  background: linear-gradient(135deg, #1d5cff, #3a8bff);
  color: white;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 10px;
}

th, td {
  padding: 10px;
}

th {
  text-align: left;
}

tr {
  border-bottom: 1px solid #eee;
}

/* RIGHT PANEL */
.right {
  width: 280px;
  background: white;
  padding: 20px;
}

.profile {
  text-align: center;
}

.profile img {
  width: 80px;
  border-radius: 50%;
}

/* BUTTON */
.btn {
  background: #1d5cff;
  color: white;
  padding: 8px 15px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Tasky.io</h2>
  <ul>
    <li class="active">Dashboard</li>
    <li>Tasks</li>
    <li>Projects</li>
    <li>Work History</li>
    <li>Inbox</li>
    <li>Settings</li>
  </ul>

  <div class="add-task" onclick="openModal()">+ Add Task</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HEADER -->
  <div class="header">
    <h2>Dashboard</h2>
    <input class="search" placeholder="Search...">
  </div>

  <!-- WELCOME -->
  <div class="welcome">
    <div>
      <h3>Welcome To</h3>
      <h1>Your Task Management Area</h1>
      <p>Manage all your tasks easily</p>
      <br>
      <button>Learn More</button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div>
      <div class="card">
        <h3>Tasks</h3>
        <table>
          <thead>
            <tr>
              <th>Task</th>
              <th>Assigned</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="taskTable"></tbody>
        </table>
      </div>
    </div>

    <div class="card blue-card">
      <h2>Total Tasks</h2>
      <h1 id="total">0</h1>
    </div>

  </div>

</div>

<!-- RIGHT PANEL -->
<div class="right">
  <div class="profile">
    <img src="https://i.pravatar.cc/100">
    <h3>Admin</h3>
    <p>Task Manager</p>
  </div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000088;">
  <div style="background:white; padding:20px; width:300px; margin:100px auto; border-radius:15px;">
    <h3>Add Task</h3>
    <input id="task" placeholder="Task name"><br><br>
    <input id="assigned" placeholder="Assigned"><br><br>

    <select id="status">
      <option>Pending</option>
      <option>Done</option>
    </select><br><br>

    <button class="btn" onclick="addTask()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function openModal(){
  document.getElementById("modal").style.display = "block";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function addTask(){
  let task = {
    name: document.getElementById("task").value,
    assigned: document.getElementById("assigned").value,
    status: document.getElementById("status").value
  };

  tasks.push(task);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  closeModal();
  render();
}

function deleteTask(i){
  tasks.splice(i,1);
  localStorage.setItem("tasks", JSON.stringify(tasks));
  render();
}

function render(){
  let table = document.getElementById("taskTable");
  table.innerHTML = "";

  tasks.forEach((t,i)=>{
    table.innerHTML += `
      <tr>
        <td>${t.name}</td>
        <td>${t.assigned}</td>
        <td>${t.status}</td>
        <td><button onclick="deleteTask(${i})">Delete</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = tasks.length;
}

render();
</script>

</body>
</html>
