<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; background:#e9edf2; }

/* HEADER */
.header {
    background: linear-gradient(#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:20px;
}

/* CONTAINER */
.container { padding:20px; }

/* CARDS */
.cards { display:flex; gap:15px; }
.card { flex:1; background:white; border-radius:8px; overflow:hidden; }
.card-header { padding:10px; color:white; font-weight:bold; }
.blue{background:#2c5fa8;} .green{background:#2fa84f;} .red{background:#d83b3b;}
.card-body { text-align:center; font-size:28px; padding:20px; }

/* GRID */
.grid { display:flex; gap:20px; margin-top:20px; }
.box { flex:1; background:white; padding:15px; border-radius:8px; }

/* TABLE */
table { width:100%; border-collapse:collapse; background:white; margin-top:15px; }
th { background:#7fa6d9; color:white; padding:10px; }
td { padding:10px; }
tr:nth-child(even){ background:#f4f4f4; }

/* BADGES */
.badge { padding:5px 10px; border-radius:5px; color:white; }
.high{background:red;} .low{background:orange;}
.progress-status{background:#f39c12;} .not{background:gray;} .done{background:green;}

/* FORM */
.form {
    background:white;
    padding:15px;
    border-radius:8px;
    margin-top:20px;
}
.form input, .form select {
    padding:8px;
    margin:5px;
}
.form button {
    padding:8px 15px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:5px;
}

/* MOBILE */
@media(max-width:768px){
.cards,.grid{flex-direction:column;}
}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
<div class="card">
<div class="card-header blue">Total</div>
<div class="card-body" id="total">0</div>
</div>

<div class="card">
<div class="card-header green">Completed</div>
<div class="card-body" id="completed">0</div>
</div>

<div class="card">
<div class="card-header red">Pending</div>
<div class="card-body" id="pending">0</div>
</div>
</div>

<!-- GRID -->
<div class="grid">
<div class="box">
<h3>Task Status</h3>
<canvas id="chart"></canvas>
</div>
</div>

<!-- FORM -->
<div class="form">
<h3>Add Task</h3>
<input type="text" id="task" placeholder="Task name">
<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<select id="status">
<option>In Progress</option>
<option>Completed</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Add</button>
</div>

<!-- TABLE -->
<table id="table">
<tr>
<th>Task</th>
<th>Category</th>
<th>Priority</th>
<th>Status</th>
<th>Due</th>
<th>Action</th>
</tr>
</table>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function render(){
    const table = document.getElementById("table");
    table.innerHTML = `
    <tr>
    <th>Task</th><th>Category</th><th>Priority</th><th>Status</th><th>Due</th><th>Action</th>
    </tr>`;

    tasks.forEach((t,i)=>{
        table.innerHTML += `
        <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td><span class="badge ${t.priority=='High'?'high':'low'}">${t.priority}</span></td>
        <td><span class="badge ${
            t.status=='Completed'?'done':
            t.status=='In Progress'?'progress-status':'not'
        }">${t.status}</span></td>
        <td>${t.due}</td>
        <td><button onclick="del(${i})">Delete</button></td>
        </tr>`;
    });

    document.getElementById("total").innerText = tasks.length;
    document.getElementById("completed").innerText = tasks.filter(t=>t.status=="Completed").length;
    document.getElementById("pending").innerText = tasks.filter(t=>t.status!="Completed").length;

    updateChart();
}

function addTask(){
    const task = document.getElementById("task").value;
    if(!task) return alert("Enter task");

    tasks.push({
        task,
        cat:category.value,
        priority:priority.value,
        status:status.value,
        due:due.value
    });

    save();
    render();
}

function del(i){
    tasks.splice(i,1);
    save();
    render();
}

/* CHART */
let chart;
function updateChart(){
    let c = tasks.filter(t=>t.status=="Completed").length;
    let p = tasks.filter(t=>t.status=="In Progress").length;
    let n = tasks.filter(t=>t.status=="Not Started").length;

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:'pie',
        data:{
            labels:["Completed","In Progress","Not Started"],
            datasets:[{
                data:[c,p,n],
                backgroundColor:["green","orange","gray"]
            }]
        }
    });
}

render();
</script>

</body>
</html>
