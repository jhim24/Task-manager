<!DOCTYPE html>
<html>
<head>
<title>Cheque Reminder</title>

<style>
body{
    font-family:Arial;
    background:#f4f7fb;
    padding:20px;
}

h2{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#2c5fa8;
    color:white;
}

.red{
    color:red;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>Cheque Reminder</h2>

<table id="table"></table>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function render(){

    const table=document.getElementById("table");

    table.innerHTML=`
    <tr>
    <th>Client</th>
    <th>Cheque No</th>
    <th>Amount</th>
    <th>Due Date</th>
    <th>Status</th>
    <th>Reminder</th>
    </tr>`;

    const today=new Date();

    tasks.forEach(t=>{

        if(!t.due) return;

        const due=new Date(t.due);

        const diff=Math.ceil((due - today)/(1000*60*60*24));

        let reminder="";

        if(diff<=3 && diff>=0){
            reminder="⚠ Due Soon";
        }
        else if(diff<0){
            reminder="❌ Overdue";
        }

        table.innerHTML+=`
        <tr>
        <td>${t.client || '-'}</td>
        <td>${t.chequeNo || '-'}</td>
        <td>${t.amount || '-'}</td>
        <td>${t.due}</td>
        <td>${t.status || 'Pending'}</td>
        <td class="${diff<=3?'red':''}">${reminder}</td>
        </tr>`;
    });

}

render();

</script>

</body>
</html>
