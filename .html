<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro To-Do Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: #333;
}

.header {
    text-align: center;
    color: white;
    padding: 25px;
}

.container {
    padding: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    flex: 1;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    color: white;
}

.card h2 {
    font-size: 32px;
}

/* GRID */
.grid {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.box {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 15px;
}

/* PROGRESS */
.progress {
    margin: 15px 0;
}

.progress-bar {
    height: 20px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 100%;
    color: white;
    text-align: right;
    padding-right: 5px;
    line-height: 20px;
}

.red { background: #ff4d4d; width: 50%; }
.yellow { background: #ffc107; width: 20%; color:black;}
.green { background: #28a745; width: 55%; }

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    border-radius: 15px;
    overflow: hidden;
}

th {
    background: #2a5298;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
}

tr:nth-child(even) {
    background: #f4f4f4;
}

/* BADGES */
.badge {
    padding: 5px 10px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
}

.high { background: red; }
.low { background: orange; }
.progress-status { background: #ffc107; color:black;}
.done { background: green; }
.not { background: gray; }

/* MOBILE */
@media(max-width:768px){
    .cards, .grid {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>TO-DO DASHBOARD PRO</h1>
    <p>Productivity Overview</p>
</div>

<div class="container">

<!-- CARDS -->
<div class="cards">
    <div class="card">
        <h3>Total</h3>
        <h2 id="total">0</h2>
    </div>
    <div class="card">
        <h3>Completed</h3>
        <h2 id="completed">0</h2>
    </div>
    <div class="card">
        <h3>Pending</h3>
        <h2 id="pending">0</h2>
    </div>
</div>

<!-- GRID -->
<div class="grid">

<div class="box">
    <h3>Task Status</h3>
    <canvas id="pieChart"></canvas>
</div>

<div class="box">
    <h3>Progress by Category</h3>

    <div class="progress">
        Work
        <div class="progress-bar">
            <div class="fill red">50%</div>
        </div>
    </div>

    <div class="progress">
        Learning
        <div class="progress-bar">
            <div class="fill yellow">20%</div>
        </div>
    </div>

    <div class="progress">
        Health
        <div class="progress-bar">
            <div class="fill green">55%</div>
        </div>
    </div>

</div>

</div>

<!-- TABLE -->
<table id="taskTable">
<tr>
    <th>Task</th>
    <th>Category</th>
    <th>Priority</th>
    <th>Status</th>
    <th>Due</th>
</tr>
</table>

</div>

<script>
const tasks = [
{task:"Create Dashboard",cat:"Work",priority:"High",status:"In Progress",due:"05-Apr-26"},
{task:"Gym",cat:"Health",priority:"Low",status:"In Progress",due:"30-Apr-26"},
{task:"Study",cat:"Learning",priority:"High",status:"Not Started",due:"06-Apr-26"},
{task:"Read Book",cat:"Personal",priority:"Low",status:"Completed",due:"15-Apr-26"}
];

// Populate table
const table = document.getElementById("taskTable");

tasks.forEach(t=>{
    table.innerHTML += `
    <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td><span class="badge ${t.priority=='High'?'high':'low'}">${t.priority}</span></td>
        <td><span class="badge ${
            t.status=='Completed'?'done':
            t.status=='In Progress'?'progress-status':'not'
        }">${t.status}</span></td>
        <td>${t.due}</td>
    </tr>`;
});

// Stats
let total = tasks.length;
let completed = tasks.filter(t=>t.status=="Completed").length;
let pending = total - completed;

document.getElementById("total").innerText = total;
document.getElementById("completed").innerText = completed;
document.getElementById("pending").innerText = pending;

// Chart
new Chart(document.getElementById("pieChart"), {
    type: 'pie',
    data: {
        labels: ["Completed","In Progress","Not Started"],
        datasets: [{
            data: [
                completed,
                tasks.filter(t=>t.status=="In Progress").length,
                tasks.filter(t=>t.status=="Not Started").length
            ],
            backgroundColor: ["green","orange","gray"]
        }]
    }
});
</script>

</body>
</html>
