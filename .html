<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #e9edf2;
}

/* HEADER */
.header {
    background: linear-gradient(#2c5fa8, #1f4f91);
    color: white;
    text-align: center;
    padding: 20px;
}
.header h1 {
    margin: 0;
    font-size: 32px;
}
.header p {
    margin: 5px;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    padding: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
}
.card {
    flex: 1;
    border-radius: 8px;
    background: white;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.card-header {
    padding: 10px;
    color: white;
    font-weight: bold;
}
.blue { background:#2c5fa8; }
.green { background:#2fa84f; }
.red { background:#d83b3b; }

.card-body {
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* GRID */
.grid {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}
.box {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 8px;
}

/* PROGRESS */
.progress {
    margin: 15px 0;
}
.bar {
    height: 20px;
    border-radius: 5px;
    color: white;
    text-align: center;
}
.red-bar { background:#e74c3c; width:50%; }
.yellow-bar { background:#f1c40f; width:20%; color:black;}
.green-bar { background:#2ecc71; width:55%; }

/* TABLE */
.table-title {
    margin-top: 20px;
    font-weight: bold;
    background:#2c5fa8;
    color:white;
    padding:10px;
    border-radius:5px 5px 0 0;
    display:inline-block;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}
th {
    background:#7fa6d9;
    color:white;
    padding:10px;
}
td {
    padding:10px;
}
tr:nth-child(even) {
    background:#f4f4f4;
}

/* BADGES */
.badge {
    padding:5px 10px;
    border-radius:5px;
    color:white;
}
.high { background:red; }
.low { background:orange; }
.progress-status { background:#f39c12; }
.not { background:gray; }
.done { background:green; }

/* FILTER BOXES */
.filters {
    display:flex;
    gap:20px;
    margin-top:20px;
}
.filter {
    flex:1;
    background:white;
    padding:15px;
    border-radius:8px;
}
.filter h4 {
    margin-top:0;
}
.filter button {
    margin:5px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.blue-btn { background:#2c5fa8; color:white;}
.green-btn { background:#2ecc71; color:white;}
.red-btn { background:#e74c3c; color:white;}
.gray-btn { background:#95a5a6; color:white;}
.yellow-btn { background:#f1c40f; }

/* RESPONSIVE */
@media(max-width:768px){
    .cards,.grid,.filters{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>TO-DO LIST DASHBOARD</h1>
    <p>PRODUCTIVITY OVERVIEW</p>
</div>

<div class="container">

<div class="cards">
